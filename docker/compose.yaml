services:
  workspace:
    build:
      context: ./workspace
      dockerfile: Dockerfile
    runtime: sysbox-runc
    security_opt:
      - seccomp=unconfined
    shm_size: "2gb"
    ports:
      - "5901:5901"
      - "6901:6901"
    environment:
      - TZ=Europe/Prague
    hostname: workspace.lemongrass.local
    restart: unless-stopped
